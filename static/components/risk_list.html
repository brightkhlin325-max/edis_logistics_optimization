<div class="page-header">
  <h1 class="page-title">風險訂單管理與 What-if 模擬</h1>
  <div class="page-sub">動態微調參數模擬，以及互動式地圖視覺化（CSV 匯入已移至 AI 決策助理頁）</div>
</div>

<!-- Interactive Map & What-if Simulation Simulator Area -->
<div class="grid-2">
  <div style="display:flex; flex-direction:column; gap:20px;">
    <!-- Region Risk Heatmap -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">🌍 區域物流延遲熱力圖與地圖</div>
      </div>
      <div id="regionMapContainer" style="height: 380px; background: #cbd5e1;"></div>
    </div>

    <!-- Risk Order Table -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">風險訂單名單明細</div>
        <span class="tag" id="riskListCount">共 0 筆</span>
      </div>
      
      <!-- Filters -->
      <div style="padding:12px; display:flex; gap:8px; border-bottom:1px solid var(--border); background:#f8fafc;">
        <input type="text" id="riskSearchInput" oninput="applyFilters()" placeholder="搜尋訂單 ID..." style="flex:1; padding:6px 12px; border:1px solid var(--border); border-radius:6px; font-size:12px; outline:none;">
        <select id="filterRisk" onchange="applyFilters()" style="padding:6px; border:1px solid var(--border); border-radius:6px; font-size:12px;">
          <option value="">全部風險</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="filterShipping" onchange="applyFilters()" style="padding:6px; border:1px solid var(--border); border-radius:6px; font-size:12px;">
          <option value="">全部配送</option>
          <option value="Standard Class">Standard Class</option>
          <option value="Second Class">Second Class</option>
          <option value="First Class">First Class</option>
          <option value="Same Day">Same Day</option>
        </select>
        <select id="filterRegion" onchange="applyFilters()" style="padding:6px; border:1px solid var(--border); border-radius:6px; font-size:12px; max-width:120px;">
          <option value="">全部區域</option>
        </select>
      </div>

      <div class="table-scroll" style="max-height: 280px;">
        <table class="risk-table">
          <thead>
            <tr>
              <th>訂單編號</th>
              <th>運送模式</th>
              <th>目的地區域</th>
              <th>延遲率</th>
              <th>風險等級</th>
              <th>實際到貨</th>
              <th>動作</th>
            </tr>
          </thead>
          <tbody id="riskListTableBody">
            <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">資料讀取中...</td></tr>
          </tbody>
        </table>
      </div>
      <div style="padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #f8fafc;">
        <button id="riskListPrevBtn" onclick="changeRiskListPage(-1)" style="padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; background:white; cursor:pointer;">上一頁</button>
        <span id="riskListPageIndicator" style="font-size: 11px; font-family: monospace;">第 1 頁</span>
        <button id="riskListNextBtn" onclick="changeRiskListPage(1)" style="padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; background:white; cursor:pointer;">下一頁</button>
      </div>
    </div>
  </div>

  <!-- Right Side: What-if Simulation Center -->
  <div style="display:flex; flex-direction:column; gap:20px;">
    <!-- What-if Single Order Simulator -->
    <div class="panel" id="instantPredictPanel">
      <div class="panel-head">
        <div class="panel-title">What-if 部分欄位試算</div>
        <span class="tag" style="background:var(--slate-lt);" title="使用可編輯欄位與預設值重算，不等同原始訂單完整機率">試算模式</span>
      </div>
      <div style="margin:0 20px; padding:10px 12px; border:1px solid #bfdbfe; background:#eff6ff; color:#1e3a8a; border-radius:8px; font-size:12px; line-height:1.6;">此區會帶入來源訂單的可用特徵，並依目前模型權重排序六個可編輯欄位；調整答案後可重新估算單筆延遲風險與調度成本。</div>
      <div class="opt-body" style="padding:20px; display:flex; flex-direction:column; gap:12px;">
        <div id="instantPredictFields" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; grid-auto-flow:dense;">
          <div class="sim-feature-field" data-feature-key="shipping_mode" style="grid-column:span 2;">
            <label class="field-label">運送方式 Shipping Mode</label>
            <select id="pf-shipping-mode" class="budget-input">
              <option value="Standard Class">Standard Class（標準）</option>
              <option value="Second Class">Second Class（二等）</option>
              <option value="First Class">First Class（頭等）</option>
              <option value="Same Day">Same Day（當日）</option>
            </select>
          </div>
          <div class="sim-feature-field" data-feature-key="order_region" style="grid-column:span 2;">
            <label class="field-label">目的地區域 Region</label>
            <select id="pf-order-region" class="budget-input" style="padding-right:20px;">
              <option value="Canada">Canada</option>
              <option value="Caribbean">Caribbean</option>
              <option value="Central Africa">Central Africa</option>
              <option value="Western Europe">Western Europe</option>
              <option value="Central America">Central America</option>
              <option value="South America">South America</option>
              <option value="Central Asia">Central Asia</option>
              <option value="East Africa">East Africa</option>
              <option value="Northern Europe">Northern Europe</option>
              <option value="Eastern Europe">Eastern Europe</option>
              <option value="East of USA">East of USA</option>
              <option value="Eastern Asia">Eastern Asia</option>
              <option value="North Africa">North Africa</option>
              <option value="Oceania">Oceania</option>
              <option value="South Asia">South Asia</option>
              <option value="South of  USA ">South of  USA</option>
              <option value="Southeast Asia">Southeast Asia</option>
              <option value="Southern Africa">Southern Africa</option>
              <option value="Southern Europe">Southern Europe</option>
              <option value="US Center ">US Center</option>
              <option value="West Africa">West Africa</option>
              <option value="West Asia">West Asia</option>
              <option value="West of USA ">West of USA</option>
            </select>
          </div>
          <div class="sim-feature-field" data-feature-key="days_for_shipment">
            <label class="field-label">計劃天數</label>
            <input type="number" id="pf-days" value="4" min="1" max="7" class="budget-input">
          </div>
          <div class="sim-feature-field" data-feature-key="product_price">
            <label class="field-label">產品價格 ($)</label>
            <input type="number" id="pf-price" value="59.99" min="0" step="0.01" class="budget-input">
          </div>
          <div class="sim-feature-field" data-feature-key="order_type">
            <label class="field-label">交易類型 Type</label>
            <select id="pf-order-type" class="budget-input">
              <option value="PAYMENT">PAYMENT</option>
              <option value="TRANSFER">TRANSFER</option>
              <option value="CASH">CASH</option>
              <option value="DEBIT">DEBIT</option>
            </select>
          </div>
          <div class="sim-feature-field" data-feature-key="order_item_quantity">
            <label class="field-label">訂購數量</label>
            <input type="number" id="pf-qty" value="1" min="1" class="budget-input">
          </div>
          <input type="hidden" id="pf-segment" value="Consumer">
          <input type="hidden" id="pf-market" value="Europe">
          <input type="hidden" id="pf-date" value="">
          <input type="hidden" id="pf-hour" value="11">
        </div>
        <button class="run-btn" id="predictRunBtn" onclick="runInstantPredict()">
          <span id="predictBtnIcon">🔮</span> <span id="predictBtnText">分析單筆訂單調度風險</span>
        </button>

        <!-- Prediction Result Display inside simulator card -->
        <div id="predictResultCard" style="border:1px dashed var(--border); border-radius:8px; padding:12px; margin-top:8px;">
          <div id="predictPlaceholder" style="text-align:center; font-size:12px; color:var(--muted); padding:10px 0;">輸入參數或在來源表格點擊「分析單筆訂單調度風險」以帶入該筆訂單特徵。</div>
          <div id="predictResultContent" style="display:none; flex-direction:column; align-items:center; gap:8px;">
            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
              <span style="font-size:13px; font-weight:700;">延遲風險率</span>
              <span id="gaugePct" style="font-family:monospace; font-weight:700; font-size:16px;">—</span>
            </div>
            <div class="prob-bar" style="width:100%; height:8px;"><div class="prob-fill fill-low" id="gaugeFill" style="width:0%"></div></div>
            <div id="predictRiskBadge" class="predict-risk-badge prb-low" style="font-size:10px; padding:2px 8px;">Low Risk</div>
            <div style="width:100%; font-size:12px; display:flex; flex-direction:column; gap:4px; border-top:1px solid var(--border); padding-top:6px; margin-top:4px;">
              <div style="display:flex; justify-content:space-between;"><span>預估罰金:</span><span id="pdPenalty">—</span></div>
              <div style="display:flex; justify-content:space-between;"><span>升級成本:</span><span id="pdUpgradeCost">—</span></div>
              <div style="display:flex; justify-content:space-between; font-weight:700;"><span>升級淨效益:</span><span id="pdNetBenefit">—</span></div>
            </div>
            <div id="predictUpgradeHint" class="predict-upgrade-hint" style="font-size:10px; margin-top:4px; padding:4px;">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
