<div class="page-header">
  <h1 class="page-title">AI 物流決策助理</h1>
  <div class="page-sub">智慧決策與策略分析中心</div>
</div>
<div class="ai-chat-shell">
  <div class="ai-chat-log" id="aiChatLog">
    <div class="ai-message assistant">
      您好，我是您的 SLIDE 專屬決策顧問。您可以隨時詢問我關於「目前高風險訂單的分布原因」、「如何合理配置物流預算」、或上傳待預測訂單 CSV 進行數據分析。
    </div>
    <div class="ai-message system" id="aiUploadStatus">目前使用系統預設驗證資料。</div>
  </div>

  <div class="ai-composer-wrap">
    <div style="margin-bottom:12px;">
      <div style="font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">💡 顧問推薦引導問題</div>
      <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; overflow-x:auto; padding-bottom:4px;">
        <div style="border:1px solid var(--border); border-radius:8px; padding:10px; background:white; cursor:pointer; transition:all 0.2s;" onclick="document.getElementById('aiQuestionInput').value='目前哪一個區域的物流延遲率最高？其根本原因是什麼？'; document.getElementById('aiQuestionInput').focus();" onmouseover="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 2px 6px rgba(0,0,0,0.05)';" onmouseout="this.style.borderColor='var(--border)'; this.style.boxShadow='none';">
          <div style="font-size:11px; font-weight:700; color:var(--primary); margin-bottom:4px;">🔍 延遲診斷</div>
          <div style="font-size:12px; color:var(--text); line-height:1.4;">分析哪一區延遲最高與原因</div>
        </div>
        <div style="border:1px solid var(--border); border-radius:8px; padding:10px; background:white; cursor:pointer; transition:all 0.2s;" onclick="document.getElementById('aiQuestionInput').value='依目前最佳化調度頁的預算與成本設定，建議優先升級哪些訂單？'; document.getElementById('aiQuestionInput').focus();" onmouseover="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 2px 6px rgba(0,0,0,0.05)';" onmouseout="this.style.borderColor='var(--border)'; this.style.boxShadow='none';">
          <div style="font-size:11px; font-weight:700; color:var(--success); margin-bottom:4px;">🎯 營運最佳化</div>
          <div style="font-size:12px; color:var(--text); line-height:1.4;">依目前參數產生升級建議</div>
        </div>
        <div style="border:1px solid var(--border); border-radius:8px; padding:10px; background:white; cursor:pointer; transition:all 0.2s;" onclick="document.getElementById('aiQuestionInput').value='如果每筆延遲罰金提高到 $500，對整體真價值 (Net-of-Service) 的侵蝕幅度有多大？'; document.getElementById('aiQuestionInput').focus();" onmouseover="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 2px 6px rgba(0,0,0,0.05)';" onmouseout="this.style.borderColor='var(--border)'; this.style.boxShadow='none';">
          <div style="font-size:11px; font-weight:700; color:var(--accent-warm); margin-bottom:4px;">⚖️ 合約校準</div>
          <div style="font-size:12px; color:var(--text); line-height:1.4;">評估罰金提高對利潤之侵蝕</div>
        </div>
      </div>
    </div>
    <div class="ai-composer">
      <textarea id="aiQuestionInput" rows="2" placeholder="請輸入提問...（例如：請幫我分析目前最容易延遲的地區與原因）"></textarea>
      <div class="ai-composer-actions">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <input type="file" id="aiPredictCsvInput" accept=".csv" style="display:none;" onchange="uploadPredictionCSV(this)">
          <button class="ai-icon-btn" id="aiUploadPredictBtn" onclick="document.getElementById('aiPredictCsvInput').click()" title="匯入待預測訂單 CSV">➕</button>
          <span class="ai-file-chip" id="aiLlmMode">系統內建模型</span>
          <span id="aiLockedBox" class="ai-file-chip" style="display:none;">🔒 需 Manager 權限</span>
          <button class="ai-file-chip" id="aiResetPredictBtn" onclick="resetCSV()" style="display:none; border:none; background:transparent; cursor:pointer; color:var(--danger);">🔄 還原</button>
          <span style="width:1px; height:18px; background:var(--border);"></span>
          <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="uploadTrainingCSV(this)">
          <a href="/static/template.csv" download="template.csv" class="ai-file-chip" style="text-decoration:none;" title="下載回填範本">📥 範本</a>
          <button class="ai-file-chip uploadCsvBtn" id="uploadCsvBtn" onclick="document.getElementById('csvFileInput').click()" style="border:none; cursor:pointer;" title="回填已知延遲與實際利潤，累積供後續重訓">📤 回填已知結果 CSV</button>
          <button class="ai-file-chip resetCsvBtn" id="resetCsvBtn" onclick="resetCSV()" style="display:none; border:none; background:transparent; cursor:pointer; color:var(--danger);">🔄 還原驗證集</button>
          <span id="lockedUploadBox" class="ai-file-chip lockedUploadBox" style="display:none;">🔒 需 Manager 權限回填</span>
        </div>
        <button class="run-btn" id="aiGenerateBriefBtn" onclick="generateAIBrief()" style="width:auto; padding:6px 16px; border-radius:20px; font-size:12px;">送出提問</button>
      </div>
    </div>
  </div>
</div>
