<div class="page-header">
  <h1 class="page-title">物流延遲預警看板</h1>
  <div class="page-sub">延遲預測系統 · 當前系統門檻：<strong style="color:var(--primary)" id="thresholdValDisplay">0.50</strong></div>
  <div id="sopRoleBadge" style="margin-top: 8px;"></div>
</div>

<!-- Actionable Insights Banner (CTA to Optimization) -->
<div id="actionableInsightsBanner" class="panel" style="padding: 20px; background: linear-gradient(90deg, var(--primary-dk) 0%, var(--primary) 100%); color: white; display: none; align-items: center; justify-content: space-between;">
  <div style="display:flex; align-items:center; gap:14px;">
    <span style="font-size:26px;">💡</span>
    <div>
      <div style="font-size:14px; font-weight:700;">調度建議</div>
      <div id="actionableInsightsText" style="font-size:13px; opacity:0.9; margin-top:2px;">正在分析目前的訂單調度效益...</div>
    </div>
  </div>
  <button class="run-btn" onclick="openRecommendedOptimization()" style="background:white; color:var(--primary); font-weight:700; width:auto; padding:8px 16px; border-radius:6px; flex-shrink:0;">查看最佳化調度 →</button>
</div>

<!-- Combined KPI Metrics Section -->
<div class="kpi-row-main">
  <div class="kpi-card-large">
    <div class="kpi-icon-wrap icon-blue">📦</div>
    <div class="kpi-info">
      <div class="kpi-label">待處理訂單總數</div>
      <div class="kpi-value" id="kpiTotalOrders">—</div>
      <div class="kpi-label" id="kpiTotalDesc" style="margin-top:4px; font-size:10px;">—</div>
    </div>
  </div>
  <div class="kpi-card-large">
    <div class="kpi-icon-wrap icon-orange">⚠️</div>
    <div class="kpi-info">
      <div class="kpi-label">預估延遲訂單數</div>
      <div class="kpi-value" id="kpiPredictedLateOrders">—</div>
      <div class="kpi-label" id="kpiPredictedDesc" style="margin-top:4px; font-size:10px;">—</div>
    </div>
  </div>
  <div class="kpi-card-large">
    <div class="kpi-icon-wrap icon-red">💸</div>
    <div class="kpi-info">
      <div class="kpi-label">預期延遲罰金損失</div>
      <div class="kpi-value" id="kpiExpectedPenaltyLoss">—</div>
      <div class="kpi-label" id="kpiExpectedDesc" style="margin-top:4px; font-size:10px;">—</div>
    </div>
  </div>
</div>

<!-- Secondary Risk and Actions Section -->
<div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-bottom: 28px; align-items: stretch;">
  <div class="kpi-card" style="padding: 22px; min-height: 150px;">
    <div class="kpi-icon-wrap icon-green" style="width: 48px; height: 48px; font-size: 20px;">📊</div>
    <div class="kpi-info">
      <div class="kpi-label" style="font-size:13px;">高風險集中組合</div>
      <div class="kpi-value" style="font-size:21px; font-weight:700; margin-top:4px;" id="execDriver">—</div>
      <div class="kpi-label" id="execDriverNote" style="margin-top:6px; font-size:12px; line-height:1.55;">—</div>
    </div>
  </div>
  <div class="panel" style="padding: 22px; min-height: 150px; border-left: 5px solid var(--primary); background: #f8fafc; margin-bottom: 0; display: flex; flex-direction: column; justify-content: center;">
    <div style="font-size: 14.5px; font-weight: 700; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">📋 營運主管建議行動</div>
    <div id="execActionText" style="font-size:15px; color:var(--text); line-height:1.65; font-weight:600;">正在載入最佳化建議策略...</div>
  </div>
</div>

<!-- Boss Table View (哪些會延遲/原因/決策) -->
<div class="panel">
  <div class="panel-head">
    <div>
      <div class="panel-title">👑 延遲訂單與對策</div>
      <div class="panel-subtitle">回答「哪些會延遲？」、「原因為何？」及「如何進行防範動作？」</div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <!-- 月份 flipper：依緊急程度（延遲率高→低）排序，逐月切換瀏覽 -->
      <div id="monthFlipper" title="月份切換" style="display:flex; align-items:center; gap:2px; border:1px solid var(--border); border-radius:6px; background:white;">
        <button onclick="flipMonth(-1)" title="上一個月份" style="border:none; background:none; cursor:pointer; font-size:13px; padding:4px 8px; color:var(--steel);">◀</button>
        <span id="monthFlipperLabel" style="font-size:12px; min-width:74px; text-align:center; color:var(--text);">全部月份</span>
        <button onclick="flipMonth(1)" title="下一個月份" style="border:none; background:none; cursor:pointer; font-size:13px; padding:4px 8px; color:var(--steel);">▶</button>
      </div>
      <span class="tag" style="background:var(--slate-lt); font-family:monospace;" id="bossDelayCount">0 筆預估延遲</span>
    </div>
  </div>
  <div class="table-scroll">
    <table class="risk-table">
      <thead>
        <tr>
          <th>訂單編號</th>
          <th>運送模式</th>
          <th>目的地區域</th>
          <th>延遲風險</th>
          <th>風險判斷依據</th>
          <th>決策動作與 What-if</th>
        </tr>
      </thead>
      <tbody id="bossTableBody">
        <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted);">資料讀取中...</td></tr>
      </tbody>
    </table>
  </div>
</div>
