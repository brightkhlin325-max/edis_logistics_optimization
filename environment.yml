name: Fastapp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # 資料處理
  - pandas>=2.0
  - numpy>=1.24
  - scikit-learn>=1.3
  # 機器學習
  - xgboost>=2.0
  # 收益預測迴歸主力（core/profit_model_pipeline.py）
  - lightgbm>=4.0
  # 最佳化
  - scipy>=1.11
  - pip:
    - pulp>=2.7
    # API 後端
    - fastapi>=0.110
    - uvicorn[standard]>=0.27
    - pydantic>=2.0
    - pydantic-core>=2.14.0
    # 後端代理載入世界地圖 GeoJSON
    - httpx>=0.27
    # FastAPI 檔案上傳 (/api/upload 的 UploadFile/File) 必要依賴
    - python-multipart>=0.0.9
    # 密碼雜湊（auth.py 登入驗證，bcrypt 4.0 為 Rust 重寫版下限）
    - bcrypt>=4.0
